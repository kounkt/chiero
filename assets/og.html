<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#FFFFFF;font-family:"Hiragino Sans",sans-serif;color:#111;overflow:hidden;position:relative}
.dots{position:absolute;right:-80px;top:-80px;width:460px;height:460px;border-radius:50%;background-image:radial-gradient(#E5E5E5 4px,transparent 4px);background-size:26px 26px}
.inner{position:absolute;inset:0;display:flex;align-items:center;gap:80px;padding:0 90px}
.raku{position:relative;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:360px;line-height:1;font-weight:600}
.raku .hat{position:absolute;top:8px;right:-22px;width:50px;height:50px;background:#E60012;border-radius:50% 50% 12% 50%}
.copy .eyebrow{display:inline-block;background:#111;color:#fff;font-size:21px;font-weight:700;letter-spacing:.06em;padding:8px 18px;border-radius:6px;margin-bottom:28px}
.copy h1{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:64px;font-weight:600;line-height:1.55;margin-bottom:26px}
.copy h1 em{font-style:normal;color:#E60012}
.copy .sub{color:#555;font-size:23px;letter-spacing:.03em;line-height:1.7}
.bar{position:absolute;bottom:0;left:0;right:0;height:16px;background:#E60012}
.logo{position:absolute;bottom:44px;right:90px;font-size:26px;font-weight:700;letter-spacing:.08em}
.logo span{color:#E60012}
</style>
</head>
<body>
<div class="dots"></div>
<div class="inner">
  <div class="raku">楽<span class="hat"></span></div>
  <div class="copy">
    <span class="eyebrow">経営者・事業家・一線で働くプロのための</span>
    <h1>成果はあるのに、<br><em>自由ではない。</em></h1>
    <p class="sub">声にならない声を言語化する、<br>チエロ式エグゼクティブコーチング</p>
  </div>
</div>
<div class="bar"></div>
<p class="logo">CHIERO<span>.</span></p>
</body>
</html>
