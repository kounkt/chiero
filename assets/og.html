<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#FFFFFF;font-family:"Hiragino Sans",sans-serif;color:#111;overflow:hidden;position:relative}
.dots{position:absolute;right:-80px;top:-80px;width:460px;height:460px;border-radius:50%;background-image:radial-gradient(#E5E5E5 4px,transparent 4px);background-size:26px 26px}
.inner{position:absolute;inset:0;display:flex;align-items:center;gap:80px;padding:0 90px}
.raku{position:relative;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:380px;line-height:1;font-weight:600}
.raku .hat{position:absolute;top:8px;right:-22px;width:52px;height:52px;background:#E60012;border-radius:50% 50% 12% 50%}
.copy .yomi{color:#E60012;font-weight:700;font-size:24px;letter-spacing:.12em;margin-bottom:24px}
.copy h1{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:58px;font-weight:600;line-height:1.6;margin-bottom:28px}
.copy .sub{color:#888780;font-size:22px;letter-spacing:.05em}
.bar{position:absolute;bottom:0;left:0;right:0;height:16px;background:#E60012}
.logo{position:absolute;bottom:44px;right:90px;font-size:26px;font-weight:700;letter-spacing:.08em}
.logo span{color:#E60012}
</style>
</head>
<body>
<div class="dots"></div>
<div class="inner">
  <div class="raku">楽<span class="hat"></span></div>
  <div class="copy">
    <p class="yomi">らく、と読むか。たのしい、と読むか。</p>
    <h1>頑張らず、<br>本来の自分で、<br>自由に。</h1>
    <p class="sub">人生を、もっと楽に。もっと楽しく。</p>
  </div>
</div>
<div class="bar"></div>
<p class="logo">CHIERO<span>.</span></p>
</body>
</html>
